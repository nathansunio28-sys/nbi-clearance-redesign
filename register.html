<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NBI Clearance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">NBI CLEARANCE</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<section class="appointment">

    <h1 class="section-title">Create New Account</h1>

    <div class="steps">
        <div class="step">1</div>
        <div class="step">2</div>
        <div class="step">3</div>
    </div>

    <div class="schedule-box">

        <form action="appointment.html">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="Enter First Name" required>
            </div>

            <div class="input-group">
                <label>Middle Name</label>
                <input type="text" placeholder="Enter Middle Name">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="Enter Last Name" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select required>
                    <option>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter Email Address" required>
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="text" placeholder="09XXXXXXXXX" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create Password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <button class="submit-btn" type="submit">
                Continue to Appointment
            </button>

        </form>

    </div>

</section>

<footer>
    <p>© 2026 NBI Clearance Online Prototype</p>
</footer>

</body>
</html>
